<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Jarvisse — Démarrage</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #05060f;
      color: #00e5ff;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    .logo-ring {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #00e5ff;
      border-right-color: #7c3aed;
      animation: spin 1.2s linear infinite;
      margin-bottom: 28px;
      position: relative;
    }

    .logo-ring::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-bottom-color: #00e5ff55;
      animation: spin 0.8s linear infinite reverse;
    }

    .logo-inner {
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background: radial-gradient(circle, #0d1117 60%, #00e5ff18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #00e5ff, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.78rem;
      color: #00e5ff88;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .progress-bar {
      width: 220px;
      height: 3px;
      background: #ffffff10;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #00e5ff, #7c3aed);
      animation: load 2.2s ease-in-out forwards;
    }

    @keyframes load {
      0%   { width: 0%; }
      40%  { width: 65%; }
      80%  { width: 88%; }
      100% { width: 100%; }
    }

    .status {
      margin-top: 16px;
      font-size: 0.72rem;
      color: #00e5ff55;
      letter-spacing: 0.15em;
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="logo-ring">
    <div class="logo-inner">⚡</div>
  </div>
  <h1>Jarvisse</h1>
  <p class="subtitle">Assistant Personnel IA · Stark Industries</p>
  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>
  <p class="status">INITIALISATION DES SYSTÈMES...</p>
</body>
</html>
