name: Build and Release Jarvisse

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies (including devDeps)
        run: npm install --include=dev

      - name: Build React App
        run: npm run build

      - name: Debug — List dist folder
        run: Get-ChildItem -Recurse dist | Select-Object FullName

      - name: Build Electron NSIS Installer
        run: npx --no-install electron-builder build --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
